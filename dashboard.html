<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MKTrading · Trh</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#060c0a; --bg2:#0a1310; --panel:#0c1512; --panel2:#10201a; --panel3:#13261f;
    --line:#1b2c26; --line2:#2c4339;
    --txt:#eaf3ee; --dim:#a9bdb3; --mut:#7e9389;
    --mint:#2ee6a6; --mint2:#1fb888; --mintdim:#1c4c3e; --amber:#e0b15a; --red:#ff6b6b;
  }
  *{box-sizing:border-box}
  ::-webkit-scrollbar{width:9px;height:9px} ::-webkit-scrollbar-thumb{background:var(--line2);border-radius:6px}
  ::-webkit-scrollbar-track{background:transparent}
  body{margin:0;color:var(--txt);font-family:"Space Grotesk",-apple-system,Segoe UI,Roboto,sans-serif;
    background:
      radial-gradient(1100px 540px at 82% -12%, rgba(46,230,166,.10), transparent 58%),
      radial-gradient(900px 500px at 8% 0%, rgba(46,230,166,.05), transparent 60%),
      linear-gradient(rgba(46,230,166,.030) 1px, transparent 1px) 0 0/46px 46px,
      linear-gradient(90deg, rgba(46,230,166,.030) 1px, transparent 1px) 0 0/46px 46px,
      linear-gradient(180deg, var(--bg2), var(--bg));
    min-height:100vh;}
  .mono{font-family:"JetBrains Mono",ui-monospace,monospace;}
  svg{display:inline-block;vertical-align:middle}
  header{padding:18px 24px 0;}
  .topbar{display:flex;justify-content:space-between;align-items:center;
    font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.14em;color:var(--mut);
    text-transform:uppercase;border-bottom:1px solid var(--line);padding-bottom:12px;}
  .brand{display:flex;align-items:center;gap:11px;}
  .brand .mark{width:30px;height:30px;border:1px solid var(--line2);border-radius:9px;
    display:grid;place-items:center;background:linear-gradient(145deg,var(--panel2),var(--panel));}
  .brand b{color:var(--mint);font-weight:700;font-family:"Space Grotesk";font-size:16px;letter-spacing:.01em;}
  .brand .ver{color:var(--mut)}
  .sysok{display:flex;align-items:center;gap:7px}
  h1{margin:18px 0 3px;font-size:27px;font-weight:700;letter-spacing:-.015em;}
  h1 span{color:var(--mint)}
  .sub{color:var(--dim);font-size:12.5px;font-family:"JetBrains Mono",monospace;letter-spacing:.02em}
  .controls{display:flex;align-items:center;gap:13px;flex-wrap:wrap;margin-top:14px;}
  .btn{display:inline-flex;align-items:center;gap:8px;background:var(--mint);color:#04140e;border:none;
    border-radius:9px;padding:9px 16px;font-size:12.5px;font-weight:700;cursor:pointer;
    font-family:"JetBrains Mono",monospace;letter-spacing:.05em;text-transform:uppercase;transition:.15s;}
  .btn:hover{background:var(--mint2)}
  .pill{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line2);border-radius:999px;
    padding:7px 14px;font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.1em;
    text-transform:uppercase;color:var(--dim);background:rgba(46,230,166,.03)}
  .live{width:8px;height:8px;border-radius:50%;background:var(--mint);box-shadow:0 0 8px var(--mint);
    animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(46,230,166,.5)}70%{box-shadow:0 0 0 7px rgba(46,230,166,0)}100%{box-shadow:0 0 0 0 rgba(46,230,166,0)}}
  .stamp{font-family:"JetBrains Mono",monospace;color:var(--dim);font-size:11.5px;letter-spacing:.05em}
  .legend{display:flex;gap:18px;flex-wrap:wrap;margin-top:13px;font-family:"JetBrains Mono",monospace;
    font-size:11.5px;color:var(--dim);letter-spacing:.03em}
  .lg{display:inline-flex;align-items:center;gap:7px}
  .sw{width:10px;height:10px;border-radius:3px;display:inline-block}
  .ln{width:16px;height:2px;border-radius:2px;display:inline-block}
  .tabs{display:flex;gap:6px;margin-top:18px;border-bottom:1px solid var(--line)}
  .tab{display:inline-flex;align-items:center;gap:8px;background:transparent;color:var(--dim);
    border:1px solid transparent;border-bottom:2px solid transparent;border-radius:9px 9px 0 0;
    padding:11px 18px;font-family:"JetBrains Mono",monospace;font-size:13px;font-weight:500;
    letter-spacing:.04em;cursor:pointer;transition:.15s;margin-bottom:-1px;}
  .tab:hover{color:var(--txt)}
  .tab.active{color:var(--mint);border-bottom-color:var(--mint);background:linear-gradient(180deg,rgba(46,230,166,.06),transparent)}
  .tab .c{color:var(--mut);font-size:11px}
  .view{display:none;padding:18px 24px 46px} .view.active{display:block}
  /* --- market cards --- */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(312px,1fr));gap:14px;}
  .card{position:relative;background:linear-gradient(160deg,var(--panel2),var(--panel));
    border:1px solid var(--line);border-radius:12px;padding:15px 16px 13px;transition:.15s;}
  .card:hover{border-color:var(--line2)}
  .card::before,.card::after{content:"";position:absolute;width:13px;height:13px;border-color:var(--mint);opacity:.5}
  .card::before{top:8px;left:8px;border-top:1.5px solid;border-left:1.5px solid}
  .card::after{bottom:8px;right:8px;border-bottom:1.5px solid;border-right:1.5px solid}
  .card.green{box-shadow:inset 3px 0 0 var(--mint)} .card.orange{box-shadow:inset 3px 0 0 var(--amber)}
  .card.gray{box-shadow:inset 3px 0 0 var(--mut)}
  .clabel{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--mut)}
  .head{display:flex;justify-content:space-between;align-items:baseline}
  .name{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px;margin:3px 0}
  .sdot{width:9px;height:9px;border-radius:50%}
  .g{background:var(--mint)} .o{background:var(--amber)} .x{background:var(--mut)} .b{background:#58a6ff}
  .price{font-family:"JetBrains Mono",monospace;font-size:23px;font-weight:600}
  .chg{font-family:"JetBrains Mono",monospace;font-size:13px;font-weight:500}
  .up{color:var(--mint)} .down{color:var(--red)}
  .chart{height:120px;margin-top:9px;position:relative}
  .rsiwrap{height:38px;margin-top:3px;position:relative}
  .crow{display:flex;justify-content:space-between;font-family:"JetBrains Mono",monospace;font-size:11.5px;
    color:var(--dim);margin-top:7px;letter-spacing:.03em}
  /* --- signals table --- */
  .sigpanel{border:1px solid var(--line);border-radius:12px;
    background:linear-gradient(180deg,var(--panel2),var(--panel));padding:16px 18px;position:relative}
  .sigpanel::before{content:"";position:absolute;top:8px;left:8px;width:13px;height:13px;
    border-top:1.5px solid var(--mint);border-left:1.5px solid var(--mint);opacity:.5}
  .sptitle{display:flex;align-items:center;gap:10px;font-family:"JetBrains Mono",monospace;font-size:13px;
    letter-spacing:.06em;color:var(--txt);text-transform:uppercase}
  .tally{font-family:"JetBrains Mono",monospace;font-size:12.5px;color:var(--dim);margin-left:auto}
  .tally b{color:var(--mint)}
  .sighint{font-family:"JetBrains Mono",monospace;font-size:11.5px;color:var(--dim);margin:11px 0 4px;
    letter-spacing:.02em;display:flex;gap:16px;flex-wrap:wrap}
  .sighint .lg{gap:6px}
  .siglist{margin-top:6px;display:flex;flex-direction:column}
  .sigrow{display:grid;grid-template-columns:54px 14px 176px 124px 78px 100px 1fr;align-items:center;gap:13px;
    font-family:"JetBrains Mono",monospace;font-size:12.5px;padding:8px 2px;border-bottom:1px solid var(--line)}
  .sigrow:last-child{border-bottom:none}
  .sighead{position:sticky;top:0;background:var(--panel);z-index:1;font-size:10px;letter-spacing:.14em;
    text-transform:uppercase;color:var(--mut)!important;border-bottom:1px solid var(--line2)!important}
  .sighead span{color:var(--mut)}
  .sigt{color:var(--mut)} .sigdot{width:9px;height:9px;border-radius:50%}
  .signame{color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
  .sigtype{color:var(--dim);white-space:nowrap} .sigprice{color:var(--txt);text-align:right}
  .sigres{text-align:left;font-weight:600} .sigres.ok{color:var(--mint)} .sigres.bad{color:var(--red)} .sigres.na{color:var(--mut)}
  .sigempty{color:var(--mut);font-family:"JetBrains Mono",monospace;font-size:12.5px;margin-top:10px}
  .err{padding:22px;font-family:"JetBrains Mono",monospace}
  /* --- reports + date groups --- */
  .datehdr{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--mint);margin:16px 0 4px;padding-bottom:5px;border-bottom:1px solid var(--line2);display:flex;gap:10px;align-items:center}
  .datehdr .cnt{color:var(--mut)}
  .repbar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
  select{background:var(--panel2);color:var(--txt);border:1px solid var(--line2);border-radius:8px;
    padding:9px 12px;font-family:"JetBrains Mono",monospace;font-size:13px;cursor:pointer}
  .exportbtn{display:inline-flex;align-items:center;gap:7px;background:transparent;color:var(--mint);
    border:1px solid var(--mint);border-radius:8px;padding:8px 14px;font-family:"JetBrains Mono",monospace;
    font-size:12.5px;font-weight:600;cursor:pointer;letter-spacing:.04em}
  .exportbtn:hover{background:rgba(46,230,166,.1)}
  .repstats{display:flex;gap:10px;flex-wrap:wrap;margin:4px 0 14px}
  .stat{border:1px solid var(--line);border-radius:9px;padding:10px 16px;background:var(--panel2);min-width:90px}
  .stat .v{font-family:"JetBrains Mono",monospace;font-size:20px;font-weight:600}
  .stat .k{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--mut);margin-top:2px}
  .analysis{margin:6px 0 16px;padding:14px 16px;border:1px solid var(--line);border-radius:10px;background:var(--panel2)}
  .analysis .t{font-family:"JetBrains Mono",monospace;font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--mint);margin-bottom:8px}
  .analysis ul{margin:0;padding-left:18px} .analysis li{font-size:13.5px;color:var(--dim);margin:4px 0;line-height:1.45}
  .repmsg{padding:20px 2px;color:var(--mut);font-family:"JetBrains Mono",monospace;font-size:12.5px}
  .modebtn{background:transparent;color:var(--dim);border:1px solid var(--line2);border-radius:8px;
    padding:7px 16px;font-family:"JetBrains Mono",monospace;font-size:12.5px;cursor:pointer;letter-spacing:.03em}
  .modebtn:hover{color:var(--txt)} .modebtn.on{background:var(--panel3);color:var(--mint);border-color:var(--mint)}
  .modebtn .c{color:var(--mut);font-size:11px}
  @media(max-width:560px){.view{padding:14px}.grid{grid-template-columns:1fr}.topbar .r{display:none}
    .sigrow{grid-template-columns:46px 12px 1fr auto auto;gap:9px}
    .sigrow .sigtype,.sighead span:nth-child(4){display:none}}
</style>
</head>
<body>
<header>
  <div class="topbar">
    <div class="brand">
      <span class="mark">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#2ee6a6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l5-5 4 3 7-8"/><circle cx="3" cy="17" r="1.4" fill="#2ee6a6"/><circle cx="19" cy="7" r="1.4" fill="#2ee6a6"/></svg>
      </span>
      <b>MKTrading</b><span class="ver">V.2026 · TRH</span>
    </div>
    <div class="r">SYS://MARKET — OPERATIONAL</div>
  </div>
  <h1>Trh — <span>živý prehľad</span></h1>
  <div class="sub">// dáta z tvojho skenera · yfinance · mierne oneskorené · nie je to odporúčanie na obchod</div>
  <div class="controls">
    <button class="btn" onclick="load()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#04140e" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.6-6.4"/><path d="M21 3v5h-5"/></svg>
      Obnoviť</button>
    <span class="pill"><span class="live"></span> System online · Live</span>
    <span class="stamp" id="stamp">načítavam…</span>
  </div>
  <div class="legend">
    <span class="lg"><span class="sw" style="background:var(--mint)"></span>aktívny</span>
    <span class="lg"><span class="sw" style="background:var(--amber)"></span>sledovať</span>
    <span class="lg"><span class="sw" style="background:var(--mut)"></span>pokoj</span>
    <span class="lg"><span class="ln" style="background:var(--mint)"></span>EMA9</span>
    <span class="lg"><span class="ln" style="background:var(--amber)"></span>EMA21</span>
    <span class="lg" style="color:var(--mut)">signály: ▲ trend · ◆ breakout · ● RSI · ✚ rýchly</span>
  </div>
  <div class="tabs">
    <button class="tab active" id="tab-markets" onclick="switchView('markets')">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="20" x2="6" y2="12"/><line x1="12" y1="20" x2="12" y2="5"/><line x1="18" y1="20" x2="18" y2="9"/></svg>
      Trhy</button>
    <button class="tab" id="tab-signals" onclick="switchView('signals')">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3.5" cy="6" r="1.3" fill="currentColor"/><circle cx="3.5" cy="12" r="1.3" fill="currentColor"/><circle cx="3.5" cy="18" r="1.3" fill="currentColor"/></svg>
      Signály <span class="c" id="tabcount"></span></button>
    <button class="tab" id="tab-reports" onclick="switchView('reports')">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="13" y2="17"/></svg>
      Reporty dňa</button>
  </div>
</header>
<div id="app"><div class="err" style="color:var(--dim)">// načítavam dáta…</div></div>

<script>
const RAW = "https://gist.githubusercontent.com/MaryMK0103/3213c918f099b2ce665923900a2639cf/raw/dashboard.json";
const order = {green:0, orange:1, gray:2};
const MINT="#2ee6a6", AMBER="#e0b15a", RED="#ff6b6b", LINE="#2c4339", PRICE="#d3e8df";
const styleByType = {trend:"triangle", breakout:"rectRot", rsi:"circle", rapid:"crossRot"};
const dotc={green:"#2ee6a6",orange:"#e0b15a",red:"#ff6b6b",blue:"#58a6ff",gray:"#7e9389"};
const TL={rapid:"rýchly",trend_up:"trend ▲",trend_down:"trend ▼",breakout_up:"breakout ▲",
  breakout_down:"breakout ▼",rsi_overbought:"RSI prekúp.",rsi_oversold:"RSI prepred.",daily:"denný pohyb"};
const RAW_REPORTS="https://gist.githubusercontent.com/MaryMK0103/3213c918f099b2ce665923900a2639cf/raw/reports.json";
let charts=[], currentView="markets", latestData=null, reports=[], selectedReportDate=null;
let signalsMode="today", archiveDate=null;

function switchView(v){
  currentView=v;
  ['markets','signals','reports'].forEach(t=>{
    const tb=document.getElementById('tab-'+t); if(tb) tb.classList.toggle('active',v===t);
    const el=document.getElementById('view-'+t); if(el) el.classList.toggle('active',v===t);
  });
  if(v==='markets') load();
}
function fmtSigned(x){ return (x>0?"+":"")+Number(x).toFixed(2)+" %"; }

function priceChart(ctx,it){
  const c=it.c||[],ef=it.ef||[],es=it.es||[],marks=it.marks||[];
  const labels=c.map((_,i)=>i);
  const mData=new Array(c.length).fill(null),mColor=new Array(c.length).fill("rgba(0,0,0,0)"),
    mStyle=new Array(c.length).fill("circle");
  marks.forEach(m=>{if(m.x>=0&&m.x<c.length){mData[m.x]=c[m.x];
    mColor[m.x]=m.d==="up"?MINT:RED;mStyle[m.x]=styleByType[m.t]||"circle";}});
  return new Chart(ctx,{type:"line",data:{labels,datasets:[
    {data:c,borderColor:PRICE,borderWidth:1.6,pointRadius:0,tension:.15},
    {data:ef,borderColor:MINT,borderWidth:1,pointRadius:0,tension:.15},
    {data:es,borderColor:AMBER,borderWidth:1,pointRadius:0,tension:.15},
    {data:mData,borderColor:"rgba(0,0,0,0)",showLine:false,pointRadius:6,pointHoverRadius:7,
     pointBackgroundColor:mColor,pointBorderColor:mColor,pointStyle:mStyle}]},
    options:{responsive:true,maintainAspectRatio:false,animation:false,
      plugins:{legend:{display:false},tooltip:{enabled:false}},
      scales:{x:{display:false},y:{display:false,grace:"4%"}}}});
}
function rsiChart(ctx,it){
  const rs=(it.rsi_s||[]).map(v=>v==null?null:v);const labels=rs.map((_,i)=>i);
  return new Chart(ctx,{type:"line",data:{labels,datasets:[
    {data:rs.map(()=>70),borderColor:LINE,borderWidth:1,borderDash:[3,3],pointRadius:0},
    {data:rs.map(()=>30),borderColor:LINE,borderWidth:1,borderDash:[3,3],pointRadius:0},
    {data:rs,borderColor:"#62e3c6",borderWidth:1.5,pointRadius:0,tension:.15,spanGaps:true}]},
    options:{responsive:true,maintainAspectRatio:false,animation:false,
      plugins:{legend:{display:false},tooltip:{enabled:false}},
      scales:{x:{display:false},y:{display:false,min:0,max:100}}}});
}
function tileHTML(it,idx){
  const cls=it.status||"gray",trUp=it.trend==="up",chgCls=it.chg_pct>=0?"up":"down";
  return `<div class="card ${cls}">
    <div class="clabel">// ${cls==='green'?'aktívny':cls==='orange'?'sledovať':'pokoj'}</div>
    <div class="name"><span class="sdot ${cls==='green'?'g':cls==='orange'?'o':'x'}"></span>
      ${it.name} <span class="${trUp?'up':'down'}">${trUp?'▲':'▼'}</span></div>
    <div class="head"><span class="price">${it.price}</span>
      <span class="chg ${chgCls}">${fmtSigned(it.chg_pct)} <span style="color:var(--mut)">/15m</span></span></div>
    <div class="chart"><canvas id="p${idx}"></canvas></div>
    <div class="rsiwrap"><canvas id="r${idx}"></canvas></div>
    <div class="crow"><span>RSI ${it.rsi}</span><span>ATR ${it.atr_pct}%</span><span>MAX ${fmtSigned(it.dist_high)}</span></div>
  </div>`;
}
function sigHint(){
  return `<div class="sighint">
    <span class="lg"><span class="sw" style="background:#ff6b6b"></span>slabý</span>
    <span class="lg"><span class="sw" style="background:#e0b15a"></span>RSI</span>
    <span class="lg"><span class="sw" style="background:#2ee6a6"></span>zhoda</span>
    <span class="lg"><span class="sw" style="background:#58a6ff"></span>denný</span>
    <span style="color:var(--mut)">| ✓ cena šla v smere signálu · ✗ nešla (% odvtedy)</span></div>`;
}
function sigHeader(){
  return `<div class="sigrow sighead"><span>čas</span><span></span><span>trh</span>
    <span>signál</span><span style="text-align:right">cena</span><span>výsledok</span></div>`;
}
function _good(s){ return s.ok!==undefined ? s.ok : (s.res_pct>0); }
function sigRow(s){
  const c=dotc[s.str]||"#7e9389", lbl=TL[s.typ]||s.typ;
  let res='<span class="sigres na">–</span>';
  if(typeof s.res_pct==="number"){ const g=_good(s);
    res=`<span class="sigres ${g?'ok':'bad'}">${g?'✓':'✗'} ${s.res_pct>0?'+':''}${s.res_pct}%</span>`; }
  return `<div class="sigrow"><span class="sigt">${s.time||""}</span>
    <span class="sigdot" style="background:${c}"></span>
    <span class="signame">${s.name}</span><span class="sigtype">${lbl}</span>
    <span class="sigprice">${s.price}</span>${res}</div>`;
}
function sigTable(sigs){ return `<div class="siglist">${sigHeader()}${sigs.map(sigRow).join("")}</div>`; }
function tallyHTML(sigs){
  let ok=0,ev=0; sigs.forEach(s=>{ if(typeof s.res_pct==="number"){ev++; if(_good(s))ok++;} });
  return ev?`<span class="tally">v správnom smere <b>${ok}/${ev}</b> (${Math.round(ok/ev*100)}%)</span>`:"";
}
function todayStr(){ return new Date().toLocaleDateString('sv-SE'); }

function setSigMode(m){ signalsMode=m; const el=document.getElementById('view-signals'); if(el) el.innerHTML=renderSignals(); }
function setArchiveDate(d){ archiveDate=d; const el=document.getElementById('view-signals'); if(el) el.innerHTML=renderSignals(); }
function renderSignals(){
  const today=todayStr();
  const todayRep=(reports||[]).find(r=>r.date===today);
  const todaySigs = todayRep ? (todayRep.signals||[]) : (((latestData&&latestData.signals)||[]));
  const pastDays=(reports||[]).filter(r=>r.date!==today && (r.signals||[]).length).map(r=>r.date).sort((a,b)=>b.localeCompare(a));
  const toolbar=`<div class="repbar">
    <button class="modebtn ${signalsMode==='today'?'on':''}" onclick="setSigMode('today')">Dnes</button>
    <button class="modebtn ${signalsMode==='archive'?'on':''}" onclick="setSigMode('archive')">Archív <span class="c">(${pastDays.length})</span></button></div>`;
  if(signalsMode==='today'){
    const body = todaySigs.length ? sigTable(todaySigs) : '<div class="sigempty">// dnes zatiaľ žiadne signály</div>';
    return `<div class="sigpanel"><div class="sptitle">signály — dnes (${todaySigs.length}) ${tallyHTML(todaySigs)}</div>${toolbar}${sigHint()}${body}</div>`;
  }
  if(!pastDays.length)
    return `<div class="sigpanel"><div class="sptitle">signály — archív</div>${toolbar}<div class="sigempty">// archív je zatiaľ prázdny — naplní sa ďalšími dňami</div></div>`;
  if(!archiveDate || !pastDays.includes(archiveDate)) archiveDate=pastDays[0];
  const sigs=((reports||[]).find(r=>r.date===archiveDate)||{}).signals||[];
  const opts=pastDays.map(d=>`<option value="${d}"${d===archiveDate?' selected':''}>${d}</option>`).join("");
  return `<div class="sigpanel"><div class="sptitle">signály — archív · ${archiveDate} (${sigs.length}) ${tallyHTML(sigs)}</div>${toolbar}
    <div class="repbar"><select onchange="setArchiveDate(this.value)">${opts}</select>
      <button class="exportbtn" onclick="exportDay('${archiveDate}')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#2ee6a6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export CSV</button></div>${sigHint()}${sigTable(sigs)}</div>`;
}

function renderReports(){
  if(!reports || !reports.length)
    return `<div class="sigpanel"><div class="sptitle">reporty dňa</div>
      <div class="repmsg">// zatiaľ žiadny report — prvý príde dnes o 22:00</div></div>`;
  if(!selectedReportDate || !reports.find(r=>r.date===selectedReportDate)) selectedReportDate=reports[0].date;
  const opts=reports.map(r=>`<option value="${r.date}"${r.date===selectedReportDate?' selected':''}>${r.date}</option>`).join("");
  const rep=reports.find(r=>r.date===selectedReportDate);
  const stat=(v,k)=>`<div class="stat"><div class="v">${v}</div><div class="k">${k}</div></div>`;
  let detail=`<div class="repstats">${stat(rep.total,"signálov")}${stat(rep.ok,"vyšli")}${stat(rep.bad,"nevyšli")}`+
    `${stat(rep.hitrate==null?"–":rep.hitrate+"%","úspešnosť")}${stat((rep.avg>0?"+":"")+rep.avg+"%","priemer")}</div>`;
  if(rep.analysis && rep.analysis.length)
    detail+=`<div class="analysis"><div class="t">🔎 prečo nevyšlo</div><ul>`+rep.analysis.map(a=>`<li>${a}</li>`).join("")+`</ul></div>`;
  detail+=sigTable(rep.signals||[]);
  return `<div class="sigpanel"><div class="sptitle">report dňa</div>
    <div class="repbar"><select onchange="selectReport(this.value)">${opts}</select>
      <button class="exportbtn" onclick="exportDay('${selectedReportDate}')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#2ee6a6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export CSV</button></div>${detail}</div>`;
}
function selectReport(d){ selectedReportDate=d; const el=document.getElementById('view-reports'); if(el) el.innerHTML=renderReports(); }
function exportDay(date){
  let sigs=[]; const r=(reports||[]).find(x=>x.date===date); if(r) sigs=r.signals||[];
  if(date===todayStr() && latestData) sigs=latestData.signals||sigs;
  const head=["cas","trh","typ","smer","cena","sila","vysledok_%"];
  const rows=sigs.map(s=>[s.time||"",s.name||"",s.typ||"",s.dir||"",s.price??"",s.str||"",(typeof s.res_pct==="number"?s.res_pct:"")]);
  const csv=[head,...rows].map(r=>r.map(x=>`"${String(x).replace(/"/g,'""')}"`).join(",")).join("\n");
  const b=new Blob(["﻿"+csv],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(b); a.download=`signaly_${date}.csv`;
  document.body.appendChild(a); a.click(); a.remove();
}
async function load(){
  document.getElementById('stamp').textContent="// načítavam…";
  try{
    const r=await fetch(RAW+"?t="+Date.now(),{cache:"no-store"});
    if(!r.ok) throw new Error("HTTP "+r.status);
    const data=await r.json(); latestData=data;
    try{ const rr=await fetch(RAW_REPORTS+"?t="+Date.now(),{cache:"no-store"}); reports=rr.ok?await rr.json():[]; }catch(e){ reports=[]; }
    if(!Array.isArray(reports)) reports=[];
    const items=(data.items||[]).slice().sort((a,b)=>
      (order[a.status]-order[b.status])||(Math.abs(b.chg_pct)-Math.abs(a.chg_pct)));
    charts.forEach(c=>{try{c.destroy()}catch(e){}});charts=[];
    if(!items.length){document.getElementById('app').innerHTML=
      '<div class="err" style="color:var(--dim)">// zatiaľ žiadne dáta — počkaj na ďalší beh skenera</div>';return;}
    document.getElementById('app').innerHTML=
      '<div id="view-markets" class="view'+(currentView==='markets'?' active':'')+'"><div class="grid">'+
        items.map(tileHTML).join('')+'</div></div>'+
      '<div id="view-signals" class="view'+(currentView==='signals'?' active':'')+'">'+renderSignals()+'</div>'+
      '<div id="view-reports" class="view'+(currentView==='reports'?' active':'')+'">'+renderReports()+'</div>';
    const tc=document.getElementById('tabcount');if(tc)tc.textContent='('+((data.signals||[]).length)+')';
    items.forEach((it,i)=>{const pc=document.getElementById('p'+i),rc=document.getElementById('r'+i);
      if(pc)charts.push(priceChart(pc,it));if(rc)charts.push(rsiChart(rc,it));});
    if(data.updated_ts){const ms=data.updated_ts*1000;
      const loc=new Date(ms).toLocaleTimeString('sk-SK',{hour:'2-digit',minute:'2-digit'});
      const ago=Math.max(0,Math.round((Date.now()-ms)/60000));
      document.getElementById('stamp').textContent=`// aktualizované ${loc} (pred ${ago} min)`;
    }else document.getElementById('stamp').textContent="// aktualizované: "+(data.updated||"—");
  }catch(e){
    document.getElementById('app').innerHTML=
      '<div class="err" style="color:var(--red)">// nepodarilo sa načítať dáta ('+e.message+')</div>';
    document.getElementById('stamp').textContent="// chyba načítania";
  }
}
load(); setInterval(load,45000);
</script>
